<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sentinel — pinned mod post</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    /* The Reddit-feed gutter around the post */
    body {
      margin: 0;
      background: var(--bg-canvas);
      padding: 24px 16px 80px;
      min-height: 100vh;
    }
    #root {
      display: block;
    }
    /* Subtle bg grid hint that this is a Reddit feed, not a fullscreen app.
       It's barely visible — just a hair of texture so the post reads as
       embedded, not as the whole document. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(91,141,239,0.04), transparent 70%);
      z-index: -1;
    }
    /* When lucide replaces the <i>, the SVG inherits color & 1.5 stroke */
    svg.lucide { stroke-width: 1.5; }
  </style>

  <!-- React 18 + Babel (pinned, with integrity) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data first (plain JS, sets window.SentinelData) -->
  <script src="data.js"></script>

  <!-- Components — order matters: primitives first, composites later -->
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Button.jsx"></script>
  <script type="text/babel" src="Chip.jsx"></script>
  <script type="text/babel" src="Toggle.jsx"></script>
  <script type="text/babel" src="Checkbox.jsx"></script>
  <script type="text/babel" src="RadioGroup.jsx"></script>
  <script type="text/babel" src="Slider.jsx"></script>
  <script type="text/babel" src="NumberInput.jsx"></script>
  <script type="text/babel" src="SeverityBadge.jsx"></script>
  <script type="text/babel" src="SignalPill.jsx"></script>
  <script type="text/babel" src="MatchScoreRow.jsx"></script>
  <script type="text/babel" src="Banner.jsx"></script>
  <script type="text/babel" src="EmptyState.jsx"></script>
  <script type="text/babel" src="TabBar.jsx"></script>
  <script type="text/babel" src="AlertCard.jsx"></script>
  <script type="text/babel" src="KpiTile.jsx"></script>
  <script type="text/babel" src="RiskGauge.jsx"></script>
  <script type="text/babel" src="ClusterGraph.jsx"></script>
  <script type="text/babel" src="ComparisonPanel.jsx"></script>
  <script type="text/babel" src="AuditLogRow.jsx"></script>
  <script type="text/babel" src="RiskListRow.jsx"></script>
  <script type="text/babel" src="ThreadRow.jsx"></script>
  <script type="text/babel" src="ThreadDetailView.jsx"></script>
  <script type="text/babel" src="PostFrame.jsx"></script>
  <script type="text/babel" src="SettingsPanel.jsx"></script>
  <script type="text/babel" src="panels.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
