<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;border-radius:999px;font-weight:600;letter-spacing:.06em;line-height:1;border:1px solid;font-family:'IBM Plex Sans',sans-serif}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
  .lg{padding:3px 10px;font-size:11px}
  .sm{padding:2px 8px;font-size:10px}
  .b-crit{background:rgba(231,76,60,.10);color:#e74c3c;border-color:rgba(231,76,60,.32)}
  .b-high{background:rgba(243,156,18,.10);color:#f39c12;border-color:rgba(243,156,18,.32)}
  .b-med {background:rgba(245,176,65,.08);color:#f5b041;border-color:rgba(245,176,65,.28)}
  .b-hea {background:rgba(70,169,115,.10);color:#46a973;border-color:rgba(70,169,115,.32)}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);min-width:60px}
</style></head><body>
<div class="row"><span class="lab">default</span>
  <span class="badge lg b-crit"><span class="dot" style="background:#e74c3c"></span>CRITICAL</span>
  <span class="badge lg b-high"><span class="dot" style="background:#f39c12"></span>HIGH</span>
  <span class="badge lg b-med"><span class="dot" style="background:#f5b041"></span>MEDIUM</span>
  <span class="badge lg b-hea"><span class="dot" style="background:#46a973"></span>HEALTHY</span>
</div>
<div class="row"><span class="lab">no dot</span>
  <span class="badge lg b-crit">CRITICAL</span>
  <span class="badge lg b-high">HIGH</span>
  <span class="badge lg b-med">MEDIUM</span>
  <span class="badge lg b-hea">HEALTHY</span>
</div>
<div class="row"><span class="lab">small</span>
  <span class="badge sm b-crit">CRITICAL</span>
  <span class="badge sm b-high">HIGH</span>
  <span class="badge sm b-med">MEDIUM</span>
  <span class="badge sm b-hea">HEALTHY</span>
</div>
</body></html>
