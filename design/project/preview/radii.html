<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:stretch}
  .box{display:flex;flex-direction:column;align-items:center;gap:10px}
  .shape{width:96px;height:72px;background:#1b1f23;border:1px solid var(--border)}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-1);text-align:center}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
  .use{font-size:11px;color:var(--fg-2);text-align:center;max-width:120px;line-height:1.35}
  .pill{border-radius:999px}
</style></head><body>
<div class="row">
  <div class="box"><div class="shape" style="border-radius:6px"></div><div class="label">--radius-sm</div><div class="px">6px</div><div class="use">chips, inputs, small buttons</div></div>
  <div class="box"><div class="shape" style="border-radius:10px"></div><div class="label">--radius-md</div><div class="px">10px</div><div class="use">cards, KPI tiles, alert rows</div></div>
  <div class="box"><div class="shape" style="border-radius:14px"></div><div class="label">--radius-lg</div><div class="px">14px</div><div class="use">the post wrapper</div></div>
  <div class="box"><div class="shape pill" style="width:96px;height:36px;margin-top:18px"></div><div class="label">--radius-pill</div><div class="px">999px</div><div class="use">severity capsules, avatars</div></div>
</div>
</body></html>
