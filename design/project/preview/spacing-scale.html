<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 22px}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0}
  .token{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:70px;flex-shrink:0}
  .px{font-family:var(--font-mono);font-size:12px;color:var(--fg-1);width:42px;flex-shrink:0}
  .bar{height:18px;background:#5b8def;border-radius:2px}
</style></head><body>
  <div class="row"><span class="token">--space-1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="token">--space-2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="token">--space-3</span><span class="px">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="token">--space-4</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="token">--space-5</span><span class="px">20px</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="token">--space-6</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="token">--space-8</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="token">--space-10</span><span class="px">40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="token">--space-12</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
</body></html>
