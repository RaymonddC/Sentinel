<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:var(--bg-canvas)}
  .frame{background:var(--bg-panel);border-bottom:1px solid var(--border);height:44px;display:flex}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--fg-1);font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border-right:1px solid var(--border);position:relative}
  .tab:last-child{border-right:none}
  .tab.active{background:var(--bg-raised);color:var(--fg-0);font-weight:600}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--fg-0)}
  .count{min-width:18px;height:16px;padding:0 5px;border-radius:8px;color:#0b0d0f;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;letter-spacing:0;background:#e74c3c}
  .desc{padding:14px 20px;font-size:12px;color:var(--fg-2);font-family:'JetBrains Mono',monospace;line-height:1.6}
</style></head><body>
<div class="frame">
  <div class="tab active">⛨ Threats <span class="count">4</span></div>
  <div class="tab">⌖ Users</div>
  <div class="tab">≣ Threads</div>
  <div class="tab">⎙ Activity</div>
  <div class="tab">⚙ Settings</div>
</div>
<div class="desc">
  function-named tabs · alerts from all 3 engines feed Threats together<br>
  44px tall · severity-colored count on Threats only · single fg-0 indicator on active tab
</div>
</body></html>
