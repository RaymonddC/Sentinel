<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .card{background:var(--bg-canvas);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:8px}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.06em;border:1px solid;align-self:flex-start;line-height:1}
  .badge .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
  .use{font-size:12px;color:var(--fg-1);line-height:1.4}
</style></head><body>
<div class="grid">
  <div class="card">
    <span class="badge" style="background:rgba(231,76,60,.10);color:#e74c3c;border-color:rgba(231,76,60,.32)"><span class="dot" style="background:#e74c3c"></span>CRITICAL</span>
    <div class="hex">#e74c3c</div>
    <div class="use">Active raid · auto-escalated</div>
  </div>
  <div class="card">
    <span class="badge" style="background:rgba(243,156,18,.10);color:#f39c12;border-color:rgba(243,156,18,.32)"><span class="dot" style="background:#f39c12"></span>HIGH</span>
    <div class="hex">#f39c12</div>
    <div class="use">Returning offender · vote brigade</div>
  </div>
  <div class="card">
    <span class="badge" style="background:rgba(245,176,65,.08);color:#f5b041;border-color:rgba(245,176,65,.28)"><span class="dot" style="background:#f5b041"></span>MEDIUM</span>
    <div class="hex">#f5b041</div>
    <div class="use">Dormant cluster · watch</div>
  </div>
  <div class="card">
    <span class="badge" style="background:rgba(70,169,115,.10);color:#46a973;border-color:rgba(70,169,115,.32)"><span class="dot" style="background:#46a973"></span>HEALTHY</span>
    <div class="hex">#46a973</div>
    <div class="use">All KPIs in range</div>
  </div>
</div>
</body></html>
