<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row{display:flex;gap:12px;align-items:stretch}
  .swatch{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:64px;display:flex;align-items:flex-end;padding:8px 12px;font-family:var(--font-mono);font-size:11px;color:var(--fg-1)}
  .meta{padding:8px 10px;background:var(--bg-canvas);border-top:1px solid var(--border)}
  .name{font-size:12px;color:var(--fg-0)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:2px}
  .demo{margin-top:16px;display:flex;gap:10px;align-items:center}
  .btn{height:36px;padding:0 14px;border-radius:6px;background:#5b8def;color:#0b0d0f;font-weight:600;font-family:var(--font-sans);font-size:13px;border:none;display:inline-flex;align-items:center;gap:6px}
  .ring{display:inline-block;width:140px;height:36px;border-radius:6px;background:transparent;border:1px solid var(--border);outline:2px solid #5b8def;outline-offset:2px}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#5b8def;color:#0b0d0f">accent</div><div class="meta"><div class="name">--accent</div><div class="hex">#5b8def</div></div></div>
  <div class="swatch"><div class="chip" style="background:#6f9bf2;color:#0b0d0f">hover</div><div class="meta"><div class="name">--accent-hover</div><div class="hex">#6f9bf2</div></div></div>
  <div class="swatch"><div class="chip" style="background:#4a7cd9;color:#0b0d0f">press</div><div class="meta"><div class="name">--accent-press</div><div class="hex">#4a7cd9</div></div></div>
</div>
<div class="demo">
  <button class="btn">Review cluster</button>
  <span class="ring"></span>
  <span style="font-size:12px;color:var(--fg-2);font-family:var(--font-mono)">2px @ 2px offset</span>
</div>
</body></html>
