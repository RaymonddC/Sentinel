<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 22px}
  .row{display:flex;align-items:stretch;gap:14px}
  .panel{flex:1;background:var(--bg-canvas);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
  .value{font-size:13px;color:var(--fg-0);font-weight:500}
  .shape{height:44px;border:1px dashed var(--border-strong);border-radius:6px;display:flex;align-items:center;padding:0 12px;color:var(--fg-1);font-size:12px}
  .shape-tab{height:44px;background:#14171a;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--fg-0);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .shape-kpi{height:88px;background:#1b1f23;border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between}
  .kpi-label{font-size:11px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .kpi-value{font-size:24px;color:var(--fg-0);font-weight:600;letter-spacing:-0.01em;font-family:'IBM Plex Sans',sans-serif}
</style></head><body>
<div class="row">
  <div class="panel">
    <div class="label">--touch-min</div>
    <div class="value">44px</div>
    <div class="shape" style="height:44px">Apple HIG minimum</div>
  </div>
  <div class="panel">
    <div class="label">--row-tab</div>
    <div class="value">44px</div>
    <div class="shape-tab">RADAR</div>
  </div>
</div>
<div class="row" style="margin-top:12px">
  <div class="panel">
    <div class="label">--row-alert (mobile)</div>
    <div class="value">64px</div>
    <div class="shape" style="height:64px;align-items:flex-start;padding-top:12px;flex-direction:column;gap:4px"><span style="font-size:13px;color:var(--fg-0)">alert headline</span><span style="font-size:11px;color:var(--fg-2)">started 14 min ago</span></div>
  </div>
  <div class="panel">
    <div class="label">--row-kpi</div>
    <div class="value">88px</div>
    <div class="shape-kpi"><div class="kpi-label">Reports / day</div><div class="kpi-value">47</div></div>
  </div>
</div>
</body></html>
