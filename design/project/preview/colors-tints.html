<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row{display:flex;gap:14px;align-items:stretch}
  .tile{flex:1;background:var(--bg-canvas);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .wash{height:64px;display:flex;align-items:center;padding:0 14px;font-family:var(--font-mono);font-size:12px;color:var(--fg-1);border-left:4px solid}
  .label{padding:8px 12px;border-top:1px solid var(--border);background:var(--bg-canvas)}
  .name{font-size:12px;color:var(--fg-0);font-weight:500}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:2px}
</style></head><body>
<div class="row">
  <div class="tile"><div class="wash" style="background:rgba(231,76,60,.10);border-left-color:#e74c3c">Alert row · CRITICAL</div><div class="label"><div class="name">--tint-critical</div><div class="hex">rgba(231,76,60,.10)</div></div></div>
  <div class="tile"><div class="wash" style="background:rgba(243,156,18,.10);border-left-color:#f39c12">Alert row · HIGH</div><div class="label"><div class="name">--tint-high</div><div class="hex">rgba(243,156,18,.10)</div></div></div>
</div>
<div class="row" style="margin-top:12px">
  <div class="tile"><div class="wash" style="background:rgba(245,176,65,.08);border-left-color:#f5b041">Alert row · MEDIUM</div><div class="label"><div class="name">--tint-medium</div><div class="hex">rgba(245,176,65,.08)</div></div></div>
  <div class="tile"><div class="wash" style="background:rgba(70,169,115,.10);border-left-color:#46a973">Alert row · HEALTHY</div><div class="label"><div class="name">--tint-healthy</div><div class="hex">rgba(70,169,115,.10)</div></div></div>
</div>
</body></html>
