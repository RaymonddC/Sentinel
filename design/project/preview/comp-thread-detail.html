<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:14px;background:var(--bg-canvas)}
  .frame{background:var(--bg-panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .header{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--fg-2);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
  .body{padding:18px 16px;display:flex;flex-direction:column;gap:14px}
  .title-card{position:relative;background:var(--bg-canvas);border:1px solid var(--border);border-radius:10px;padding:14px 16px 14px 20px;overflow:hidden}
  .title-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:#f39c12}
  .ribbon{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.06em;line-height:1;border:1px solid;background:rgba(243,156,18,.10);color:#f39c12;border-color:rgba(243,156,18,.32)}
  .trend{font-size:11px;color:#f39c12;font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  .meta{font-size:11px;color:var(--fg-2)}
  .title{font-size:17px;color:var(--fg-0);font-weight:600;line-height:1.3}
  .gauge-card{background:var(--bg-canvas);border:1px solid var(--border);border-radius:10px;padding:14px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-2);margin-bottom:8px}
  .forecasts{display:flex;gap:18px;flex-wrap:wrap}
  .fc{display:flex;flex-direction:column;gap:2px}
  .fc .l{font-size:11px;color:var(--fg-2)}
  .fc .v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;line-height:1;letter-spacing:-0.01em}
  .copy{font-size:13px;color:var(--fg-1);line-height:1.45;margin-top:6px}
  .copy .crit{color:#e74c3c;font-family:'JetBrains Mono',monospace}
  .copy .med{color:#f5b041;font-family:'JetBrains Mono',monospace}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:'IBM Plex Sans',sans-serif;font-size:14px;border-radius:6px;border:1px solid transparent;padding:0 16px;height:40px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-weight:500}
  .btn-primary{background:#5b8def;color:#0b0d0f;font-weight:600}
  .btn-secondary{background:#1b1f23;color:#e6e9ed;border-color:#2b3138}
  .btn-ghost{background:transparent;color:#aab2bd}
</style></head><body>
<div class="frame">
  <div class="header">Threads › detail</div>
  <div class="body">
    <a style="font-size:13px;color:var(--fg-1);text-decoration:none">‹ Back to threads</a>

    <div class="title-card">
      <div class="ribbon">
        <span class="badge">HIGH</span>
        <span class="trend">↑ rising</span>
        <span class="meta">· age 2h</span>
      </div>
      <div class="title">"AMA: my unpopular take"</div>
    </div>

    <div class="gauge-card">
      <svg width="160" height="136" viewBox="0 0 180 156">
        <path d="M 16.6 110.6 A 78 78 0 1 1 163.4 110.6" stroke="#2b3138" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M 16.6 110.6 A 78 78 0 1 1 134.6 26.1" stroke="#f39c12" stroke-width="12" stroke-linecap="round" fill="none"/>
        <text x="90" y="92" text-anchor="middle" font-family="IBM Plex Sans" font-size="36" font-weight="600" fill="#e6e9ed">78</text>
        <text x="90" y="112" text-anchor="middle" font-family="IBM Plex Sans" font-size="11" font-weight="600" fill="#f39c12" letter-spacing="0.08em">RISING</text>
      </svg>
      <div>
        <div class="eyebrow">Forecast · next 90 min</div>
        <div class="forecasts">
          <div class="fc"><span class="l">No intervention</span><span class="v" style="color:#e74c3c">95%</span></div>
          <div class="fc"><span class="l">With slow mode</span><span class="v" style="color:#f5b041">43%</span></div>
        </div>
        <div class="copy">Risk is projected to peak at <span class="crit">95%</span> within 90 minutes. Slow mode reduces predicted peak to <span class="med">43%</span>.</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary">⚡ Enable slow mode</button>
      <button class="btn btn-secondary">▽ Auto-filter new accounts</button>
      <button class="btn btn-ghost">🔒 Lock thread</button>
    </div>
  </div>
</div>
</body></html>
