<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--bg-canvas);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px}
  .specimen{font-size:42px;line-height:1;margin-bottom:14px;color:var(--fg-0);letter-spacing:-0.01em}
  .alpha{font-size:13px;line-height:1.5;color:var(--fg-1);margin-bottom:10px}
  .label{display:flex;justify-content:space-between;font-size:11px;color:var(--fg-2);font-family:var(--font-mono);letter-spacing:.04em}
</style></head><body>
<div class="row">
  <div class="card">
    <div class="specimen" style="font-family:'IBM Plex Sans',sans-serif;font-weight:600">Sentinel 142</div>
    <div class="alpha" style="font-family:'IBM Plex Sans',sans-serif">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz<br>0123456789 — , . : ;</div>
    <div class="label"><span>IBM Plex Sans</span><span>400 / 500 / 600</span></div>
  </div>
  <div class="card">
    <div class="specimen" style="font-family:'JetBrains Mono',monospace;font-weight:500">u/mod_jane</div>
    <div class="alpha" style="font-family:'JetBrains Mono',monospace;font-size:12px">u/throwaway_4471<br>r/example · #C-441<br>14:22 · conf 0.92 · +5/-2</div>
    <div class="label"><span>JetBrains Mono</span><span>400 / 500</span></div>
  </div>
</div>
</body></html>
