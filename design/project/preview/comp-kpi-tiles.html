<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .tile{background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;padding:12px 14px;height:88px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;position:relative}
  .label{font-size:11px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .value{font-size:24px;color:var(--fg-0);font-weight:600;letter-spacing:-0.01em;font-family:'IBM Plex Sans',sans-serif}
  .row{display:flex;align-items:baseline;gap:8px}
  .delta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg-1)}
  .dot{position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%}
</style></head><body>
<div class="grid">
  <div class="tile"><span class="dot" style="background:#f5b041"></span><div class="label">Reports / day</div><div class="row"><span class="value">47</span><span class="delta">↗ +12</span></div></div>
  <div class="tile"><span class="dot" style="background:#f39c12"></span><div class="label">Removal rate</div><div class="row"><span class="value">8.4%</span><span class="delta">↗ +1.1</span></div></div>
  <div class="tile"><span class="dot" style="background:#46a973"></span><div class="label">Unanswered modmail</div><div class="row"><span class="value">6</span><span class="delta">↘ −2</span></div></div>
  <div class="tile"><span class="dot" style="background:#f5b041"></span><div class="label">Active mods (7d)</div><div class="row"><span class="value">4 / 7</span></div></div>
  <div class="tile"><span class="dot" style="background:#f5b041"></span><div class="label">Median response</div><div class="row"><span class="value">2h 14m</span><span class="delta">↗ +0:18</span></div></div>
  <div class="tile"><span class="dot" style="background:#46a973"></span><div class="label">Auto-actions</div><div class="row"><span class="value">211</span><span class="delta">↗ +34</span></div></div>
</div>
</body></html>
