<!doctype html><html><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.chip{display:flex;align-items:flex-end;padding:10px 12px;font-family:var(--font-mono);font-size:11px;color:var(--fg-1)}</style>
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0b0d0f">canvas</div><div class="meta"><div class="name">--bg-canvas</div><div class="hex">#0b0d0f · the page</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14171a">panel</div><div class="meta"><div class="name">--bg-panel</div><div class="hex">#14171a · cards, rows</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1b1f23">raised</div><div class="meta"><div class="name">--bg-raised</div><div class="hex">#1b1f23 · hover, active</div></div></div>
  <div class="swatch"><div class="chip" style="background:#22272d">raised-2</div><div class="meta"><div class="name">--bg-raised-2</div><div class="hex">#22272d · pressed</div></div></div>
</div>
</body></html>
