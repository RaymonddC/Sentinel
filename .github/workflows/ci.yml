name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Note: a "Node.js 20 deprecated" annotation may appear until
# actions/checkout and actions/setup-node ship @v5 with Node 24 target.
# GitHub auto-upgrades the runtime on 2026-06-02; current warnings are
# advisory only and do not affect CI results.

jobs:
  ci:
    name: Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck
